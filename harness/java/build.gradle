plugins {
    id 'java'
}

// Pin the bytecode version. Without this, `gradle jar` emits class files for
// whatever JDK built it (e.g. JDK 25 -> class version 69), which an older
// runtime JDK cannot load. As a -javaagent that failure is a fatal native VM
// crash during init, not a catchable error.
tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.ow2.asm:asm:9.9.1'
    implementation 'org.ow2.asm:asm-tree:9.9.1'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
}

jar {
    manifest {
        attributes(
            'Premain-Class': 'crossfuzz.CoverageAgent',
            'Can-Retransform-Classes': 'true',
            'Main-Class': 'crossfuzz.Harness'
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveFileName = 'crossfuzz.jar'
}
