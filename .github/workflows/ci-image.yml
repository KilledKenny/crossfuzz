# Builds the crossfuzz CI Docker image from nix/docker.nix and pushes it to
# GHCR as ghcr.io/<owner>/crossfuzz-ci.
#
# Triggers:
#   - push to main touching the toolchain definition  → rebuild + push
#   - manual workflow_dispatch                         → rebuild + push
#
# The image is consumed by .github/workflows/test.yml.
# Bootstrap: run this workflow manually (workflow_dispatch) once to create the
# first image before test.yml can use it.

name: Build CI image

on:
  push:
    branches: [main]
    paths:
      - 'shell.nix'
      - 'nix/**'
      - 'harness/python/requirements.txt'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v16

      # Update to the latest nixpkgs-unstable before building — "latest rolling"
      # per project preference (no pinned commit in nix/nixpkgs.nix).
      - name: Update nixpkgs channel
        run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
          nix-channel --update

      # Caches the Nix store between runs to avoid re-downloading packages.
      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build Docker image
        run: nix-build nix/docker.nix -o result

      - name: Load image into Docker
        run: docker load --input result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/crossfuzz-ci"
          # Lowercase the owner — GHCR requires lowercase package names.
          IMAGE="${IMAGE,,}"
          docker tag crossfuzz-ci:latest "${IMAGE}:latest"
          docker tag crossfuzz-ci:latest "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"
