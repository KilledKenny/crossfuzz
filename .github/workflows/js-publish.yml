# Publishes the `@crossfuzz/crossfuzz` npm package.
#
# Triggers:
#   - push to main touching harness/js/**  → `npm publish --dry-run`
#   - push of tag matching js-v*           → real publish to npmjs.com
#   - manual workflow_dispatch             → real publish (TEMPORARY: remove
#                                            once tag-based flow is verified)
#

name: Publish crossfuzz (JS)

on:
  push:
    branches: [main]
    paths:
      - 'harness/js/**'
      - '.github/workflows/js-publish.yml'
    tags:
      - 'js-v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: harness/js

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Assert tag matches package.json version (tag push only)
        if: startsWith(github.ref, 'refs/tags/js-v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/js-v}"
          file_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::tag js-v${tag_version} does not match package.json version ${file_version}"
            exit 1
          fi
          echo "version ok: ${file_version}"

      - name: npm publish --dry-run
        run: npm publish --dry-run --access public

  publish:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/js-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Publish to npm
        working-directory: harness/js
        run: npm publish --access public
