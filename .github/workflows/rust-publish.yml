# Publishes the `crossfuzz` crate to crates.io.
#
# Triggers:
#   - push to main touching harness/rust/**  → `cargo publish --dry-run`
#   - push of tag matching rust-v*           → real publish to crates.io
#   - manual workflow_dispatch               → real publish (TEMPORARY: remove
#                                              once tag-based flow is verified)
#
# Auth: crates.io Trusted Publishing (OIDC). One-time setup required — see
# harness/rust/README.md for instructions.

name: Publish crossfuzz (Rust)

on:
  push:
    branches: [main]
    paths:
      - 'harness/rust/**'
      - '.github/workflows/rust-publish.yml'
    tags:
      - 'rust-v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: harness/rust

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Assert tag matches Cargo.toml version (tag push only)
        if: startsWith(github.ref, 'refs/tags/rust-v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/rust-v}"
          file_version=$(grep '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::tag rust-v${tag_version} does not match Cargo.toml version ${file_version}"
            exit 1
          fi
          echo "version ok: ${file_version}"

      - name: cargo publish --dry-run
        run: cargo publish --dry-run

  publish:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/rust-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
