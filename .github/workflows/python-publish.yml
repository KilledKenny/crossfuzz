# Publishes the `crossfuzz` Python package to PyPI / TestPyPI.
#
# Triggers:
#   - push to main touching harness/python/**  → TestPyPI (with .devN suffix)
#   - push of tag matching python-v*           → real PyPI
#
# Auth: PyPI Trusted Publishing (OIDC). One-time setup required in the
# PyPI and TestPyPI web UIs — see harness/python/README.md.

name: Publish crossfuzz (Python)

on:
  push:
    branches: [main]
    paths:
      - 'harness/python/**'
      - '.github/workflows/python-publish.yml'
    tags:
      - 'python-v*'

defaults:
  run:
    working-directory: harness/python

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for `git rev-list --count HEAD`

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Stamp dev version (TestPyPI only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dev_n=$(git rev-list --count HEAD)
          python - <<EOF
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          text = re.sub(
              r'(?m)^version = "([^"]+)"',
              lambda m: f'version = "{m.group(1)}.dev${dev_n}"',
              text,
              count=1,
          )
          p.write_text(text)
          print(text.splitlines()[next(i for i, l in enumerate(text.splitlines()) if l.startswith("version"))])
          EOF

      - name: Assert tag matches pyproject version (tag push only)
        if: startsWith(github.ref, 'refs/tags/python-v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/python-v}"
          file_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::tag python-v${tag_version} does not match pyproject.toml version ${file_version}"
            exit 1
          fi
          echo "version ok: ${file_version}"

      - name: Build sdist + wheel
        run: |
          rm -rf dist
          python -m build

      - name: twine check
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: harness/python/dist/

  publish-testpypi:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          packages-dir: dist/

  publish-pypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
