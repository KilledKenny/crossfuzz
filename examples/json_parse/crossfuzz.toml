[campaign]
name = "json_parse_diff"
timeout = "30m"
exec_timeout = "1000ms"
max_input_size = 4096
warmup_rounds = 10

[corpus]
seed_dir = "./seeds"
corpus_dir = "./corpus"
findings_dir = "./findings"

[[target]]
name = "c_json"
language = "c"
binary = "./c/c_target"
build_cmd = "cd c && clang-19 -fsanitize-coverage=trace-pc-guard -O2 -I ../../../harness/c -o c_target c_target.c ../../../harness/c/crossfuzz.c && patchelf --set-interpreter $(patchelf --print-interpreter $(which ls)) c_target"

[[target]]
name = "go_json"
language = "go"
binary = "./go/go_target_bin"
build_cmd = "cd go && PKGS=$(go list -deps . | grep -vE '^(runtime$|runtime/.*|sync$|sync/.*|internal/.*|reflect$|syscall$|os$|os/.*)' | paste -sd,) && go build -cover -covermode=atomic -coverpkg=\"$PKGS\" -o go_target_bin ."

[[target]]
name = "java_json"
language = "java"
binary = "java"
args = ["-javaagent:java/crossfuzz.jar", "-cp", "java/crossfuzz.jar:java/target/classes", "JavaTarget"]
build_cmd = "mvn -f java/pom.xml compile"

[[target]]
name = "ts_json"
language = "js"
binary = "bun"
args = ["run", "--preload", "@crossfuzz/crossfuzz/instrument.ts", "./js/ts_target.ts"]
build_cmd = "bun add @crossfuzz/crossfuzz"

[comparator]
type = "byte_equal"
