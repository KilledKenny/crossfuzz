[campaign]
name = "base64_diff"
timeout = "30m"
exec_timeout = "500ms"
max_input_size = 1024

[corpus]
seed_dir = "./seeds"
corpus_dir = "./corpus"
findings_dir = "./findings"

[[target]]
name = "c_base64"
language = "c"
binary = "./c/c_target"
build_cmd = "cd c && clang-19 -fsanitize-coverage=trace-pc-guard -O2 -I ../../../harness/c -o c_target c_target.c ../../../harness/c/crossfuzz.c && patchelf --set-interpreter $(patchelf --print-interpreter $(which ls)) c_target"

[[target]]
name = "cpp_base64"
language = "cpp"
binary = "./cpp/cpp_target"
build_cmd = "cd cpp && clang-19 -fsanitize-coverage=trace-pc-guard -O2 -c ../../../harness/c/crossfuzz.c -o crossfuzz_c.o && clang++-19 -std=c++23 -fsanitize-coverage=trace-pc-guard -O2 -I ../../../harness/c -o cpp_target cpp_target.cpp ../../../harness/cpp/crossfuzz.cpp crossfuzz_c.o && rm crossfuzz_c.o && NIX_INTERP=$(patchelf --print-interpreter $(which ls)) && NIX_STDCXX=$(dirname $(g++ -print-file-name=libstdc++.so.6)) && ORIG_RPATH=$(patchelf --print-rpath cpp_target | tr ':' '\\n' | grep -v '/lib/x86_64-linux-gnu' | paste -sd':') && patchelf --set-interpreter $NIX_INTERP --set-rpath $NIX_STDCXX:$ORIG_RPATH cpp_target"

[[target]]
name = "go_base64"
language = "go"
binary = "./go/go_target_bin"
build_cmd = "cd go && PKGS=$(go list -deps . | grep -vE '^(runtime$|runtime/.*|sync$|sync/.*|internal/.*|reflect$|syscall$|os$|os/.*)' | paste -sd,) && go build -cover -covermode=atomic -coverpkg=\"$PKGS\" -o go_target_bin ."

[[target]]
name = "js_base64"
language = "js"
binary = "bun"
args = ["run", "--preload", "@crossfuzz/crossfuzz/instrument.ts", "./js/target_js.js"]
build_cmd = "bun add @crossfuzz/crossfuzz"

[[target]]
name = "ts_base64"
language = "js"
binary = "bun"
args = ["run", "--preload", "@crossfuzz/crossfuzz/instrument.ts", "./js/target_ts.ts"]
build_cmd = "bun add @crossfuzz/crossfuzz"

[[target]]
name = "python_base64"
language = "python"
binary = "../../harness/python/.venv/bin/python3"
args = ["./python/python_target.py"]

[[target]]
name = "rust_base64"
language = "rust"
binary = "./rust/target/release/rust_base64"
build_cmd = "cd rust && cargo rustc --release -- -C passes=sancov-module -C llvm-args=-sanitizer-coverage-level=3 -C llvm-args=-sanitizer-coverage-trace-pc-guard"

[comparator]
type = "byte_equal"
