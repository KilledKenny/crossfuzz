[campaign]
name = "base64_diff"
timeout = "30m"
exec_timeout = "500ms"
max_input_size = 1024
warmup_rounds = 10

[corpus]
seed_dir = "./seeds"
corpus_dir = "./corpus"
findings_dir = "./findings"

[[target]]
name = "c_base64"
language = "c"
binary = "./c/build/c_target"
build_cmd = "cmake -B c/build -S c -DCMAKE_BUILD_TYPE=Release -Dcrossfuzz_DIR=../../../harness/build/lib/cmake/crossfuzz && cmake --build c/build"

[[target]]
name = "cpp_base64"
language = "cpp"
binary = "./cpp/build/cpp_target"
build_cmd = "cmake -B cpp/build -S cpp -DCMAKE_BUILD_TYPE=Release -Dcrossfuzz_DIR=../../../harness/build/lib/cmake/crossfuzz && cmake --build cpp/build"

[[target]]
name = "go_base64"
language = "go"
binary = "./go/go_target_bin"
build_cmd = "cd go && PKGS=$(go list -deps . | grep -vE '^(runtime$|runtime/.*|sync$|sync/.*|internal/.*|reflect$|syscall$|os$|os/.*)' | paste -sd,) && go build -cover -covermode=atomic -coverpkg=\"$PKGS\" -o go_target_bin ."

[[target]]
name = "js_base64"
language = "js"
binary = "bun"
args = ["run", "--preload", "@crossfuzz/crossfuzz/instrument.ts", "./js/target_js.js"]
build_cmd = "bun add @crossfuzz/crossfuzz"

[[target]]
name = "ts_base64"
language = "js"
binary = "bun"
args = ["run", "--preload", "@crossfuzz/crossfuzz/instrument.ts", "./js/target_ts.ts"]
build_cmd = "bun add @crossfuzz/crossfuzz"

[[target]]
name = "python_base64"
language = "python"
binary = "../../harness/python/.venv/bin/python3"
args = ["./python/python_target.py"]

[[target]]
name = "rust_base64"
language = "rust"
binary = "./rust/target/release/rust_base64"
build_cmd = "cd rust && cargo rustc --release -- -C passes=sancov-module -C llvm-args=-sanitizer-coverage-level=3 -C llvm-args=-sanitizer-coverage-trace-pc-guard"

[[target]]
name = "java_base64"
language = "java"
binary = "java"
args = ["-javaagent:java/crossfuzz.jar", "-cp", "java/crossfuzz.jar:java/build/classes/java/main", "JavaTarget"]
build_cmd = "gradle -p java compileJava"

[comparator]
type = "byte_equal"
