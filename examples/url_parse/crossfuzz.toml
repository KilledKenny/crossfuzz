[campaign]
name = "url_parse_diff"
timeout = "30m"
exec_timeout = "1000ms"
max_input_size = 1024

[corpus]
seed_dir = "./seeds"
corpus_dir = "./corpus"
findings_dir = "./findings"

[[target]]
name = "go_url"
language = "go"
binary = "./go_url_target"
build_cmd = "cd go_target && PKGS=$(go list -deps . | grep -vE '^(runtime$|runtime/.*|sync$|sync/.*|internal/.*|reflect$|syscall$|os$|os/.*)' | paste -sd,) && go build -cover -covermode=atomic -coverpkg=\"$PKGS\" -o ../go_url_target ."

[[target]]
name = "java_url"
language = "java"
binary = "java"
args = ["-javaagent:../../harness/java/build/libs/crossfuzz.jar", "-cp", "../../harness/java/build/libs/crossfuzz.jar:.", "JavaTarget"]
build_cmd = "cd ../../harness/java && gradle jar && cd - && javac -cp ../../harness/java/build/libs/crossfuzz.jar JavaTarget.java"

[comparator]
type = "byte_equal"

[input_filter]
binary = "./url_filter"
build_cmd = "cd filter && go build -o ../url_filter ."
